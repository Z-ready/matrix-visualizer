<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Matrix Linear Transformation Visualizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div>
          <h1>Linear Transformations</h1>
          <p>Visualize the geometric meaning of 2x2 matrices.</p>
        </div>
      </header>

      <main class="layout">
        <section class="panel">
          <h2>2x2 Matrix</h2>
          <div class="input-group">
            <label>Matrix A</label>
            <div class="matrix-scroll">
              <div class="matrix matrix-2">
                <div class="cell">
                  <input id="m11" type="number" step="0.1" value="1" />
                  <input class="slider" type="range" min="-10" max="10" step="0.1" value="1" data-target="m11" />
                </div>
                <div class="cell">
                  <input id="m12" type="number" step="0.1" value="0" />
                  <input class="slider" type="range" min="-10" max="10" step="0.1" value="0" data-target="m12" />
                </div>
                <div class="cell">
                  <input id="m21" type="number" step="0.1" value="0" />
                  <input class="slider" type="range" min="-10" max="10" step="0.1" value="0" data-target="m21" />
                </div>
                <div class="cell">
                  <input id="m22" type="number" step="0.1" value="1" />
                  <input class="slider" type="range" min="-10" max="10" step="0.1" value="1" data-target="m22" />
                </div>
              </div>
            </div>
          </div>

          <button id="apply">Apply Transform</button>
          <div class="hint" id="hint">
            Try a rotation matrix: [[0, -1], [1, 0]]
          </div>
        </section>

        <section class="canvas-wrap">
          <div class="viz-stage" id="vizStage">
            <canvas id="viz"></canvas>
          </div>
        </section>
      </main>
    </div>

    <script src="main.js"></script>
  </body>
</html>
