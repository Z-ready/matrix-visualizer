<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Matrix Linear Transformation Visualizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div>
          <h1>Linear Transformations</h1>
          <p>Visualize the geometric meaning of 2x2 matrices.</p>
        </div>
      </header>

      <main class="layout">
        <section class="panel">
          <h2>2x2 Matrix</h2>
          <div class="input-group">
            <label>Matrix A</label>
            <div class="matrix-bracket">
              <div class="matrix-input">
                <input id="m11" type="number" step="0.1" value="1" />
                <input id="m12" type="number" step="0.1" value="0" />
                <input id="m21" type="number" step="0.1" value="0" />
                <input id="m22" type="number" step="0.1" value="1" />
              </div>
            </div>
          </div>

          <button id="apply">Apply Transform</button>
          <div class="hint" id="hint">
            Try a rotation matrix: [[0, -1], [1, 0]]
          </div>

          <div class="stats-panel">
            <h3>Analysis</h3>
            <div class="stat-item">
              <label>Determinant</label>
              <div id="detDisplay" class="det-value det-positive">1.000</div>
            </div>
            <div class="stat-item">
              <label>Basis Vector i</label>
              <div id="basisIDisplay" class="basis-value">(1.000, 0.000)</div>
            </div>
            <div class="stat-item">
              <label>Basis Vector j</label>
              <div id="basisJDisplay" class="basis-value">(0.000, 1.000)</div>
            </div>
            <div class="stat-item">
              <label>Unit Square Area</label>
              <div id="areaDisplay" class="area-value">1.000</div>
            </div>
          </div>
        </section>

        <section class="canvas-wrap">
          <div class="viz-stage" id="vizStage">
            <canvas id="viz"></canvas>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
